<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclagem de Células</title>
    <style>
        body{
            font-family: 'Courier New', Courier, monospace;
        }

        table{
            border-collapse: collapse;
            width: 300px;
        }

        th{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

    </style>
</head>
<body>
    <h1>Mesclagem de Células</h1>
    <table>
        <tr>
            <th>A</th>
            <th colspan="2">B</th>
            

        </tr>
        <tr>
            <th>D</th>
            <th rowspan="2">E</th>
            <th>F</th>
        </tr>
        <tr>
            <th>G</th>
            
            <th>I</th>
        </tr>
        <tr>
            <th colspan="2 ">J</th>
            
            <th>L</th>
        </tr>
    </table>
</body>
</html>
