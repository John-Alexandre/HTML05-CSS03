<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        caption{
            font-weight: bold;
            font-size: 1.3em;
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        td, th {
            border: 1px solid black;
            padding: 8px;
        }

        col.cnome {
            background-color: lightblue;
        }

        .f{
            background-color: lightpink;
        }
        .m{
            background-color: lightskyblue;
        }
        col.cidade{
            background-color: lightgray;
        }
            
        
    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>

    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprof">
        </colgroup>
        <caption>
            Cadastro
        </caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Sexo</th>
                <th>Idade</th>
                <th>Profissão</th>
            </tr>
            <tr>
                <td>Ana Maria</td>
                <td class="f">F</td>
                <td>25  </td>
                <td>Jornalista</td>
            </tr>
            <tr>
                <td>Cláudio</td>
                <td class="m">M</td>
                <td>28</td>
                <td>Programador</td>
            </tr>
            <tr>
                <td>Jonathan</td>
                <td class="m">M</td>
                <td>21</td>
                <td>Web Desiger</td>
            </tr>
            <tr>
                <td>Helio</td>
                <td class="m">M</td>
                <td>19</td>
                <td>Vendedor</td>
            </tr>
            <tr>
                <td>Mária</td>
                <td class="f">F</td>
                <td>39</td>
                <td>Médica</td>
            </tr>
            <tr>
                <td>Otávio</td>
                <td class="m">M</td>
                <td>22</td>
                <td>Nutricionista</td>
            </tr>
        </thead>
    </table>
</body>
</html>
